<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spootify</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #0b0b0f;
    color: #eee;
    font-family: system-ui, sans-serif;
    display: flex;
    height: 100vh;
  }

  /* Layout */
  .library {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
  }

  .player-area {
    width: 420px;
    border-left: 1px solid #222;
    padding: 16px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    position: relative;
  }

  /* Song list */
  .song-item {
    display: grid;
    grid-template-columns: 64px 1fr;
    gap: 12px;
    padding: 10px;
    margin-bottom: 8px;
    background: #15151c;
    border-radius: 8px;
    cursor: pointer;
    align-items: center;
  }

  .song-item:hover {
    background: #1d1d26;
  }

  .song-cover {
    width: 64px;
    height: 64px;
    border-radius: 4px;
    background: #333;
    object-fit: cover;
  }

  .song-meta {
    display: grid;
    grid-template-rows: auto auto auto;
    row-gap: 2px;
  }

  .song-title {
    font-size: 14px;
    font-weight: 600;
  }

  .song-artist {
    font-size: 12px;
    color: #aaa;
  }

  .song-extra {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    font-size: 11px;
    color: #888;
    align-items: center;
  }

  .tag {
    padding: 2px 6px;
    border-radius: 999px;
    background: #222;
  }

  .length {
    font-variant-numeric: tabular-nums;
  }

  /* Player right side */
  .current-cover {
    width: 220px;
    height: 220px;
    border-radius: 8px;
    background: #222;
    object-fit: cover;
    margin: 0 auto 12px auto;
  }

  .current-artist {
    text-align: center;
    font-size: 14px;
    color: #ccc;
    margin-bottom: 4px;
  }

  .current-title {
    text-align: center;
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .time-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: #aaa;
    margin-bottom: 8px;
  }

  .time-row span {
    font-variant-numeric: tabular-nums;
  }

  .time-slider {
    flex: 1;
  }

  .controls-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  button {
    padding: 6px 12px;
    background: #262633;
    color: #eee;
    border: 1px solid #444;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
  }

  button:hover {
    background: #333347;
  }

  /* Record player bottom-right */
  .turntable {
    position: absolute;
    right: 16px;
    bottom: 16px;
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #444, #111);
    box-shadow: 0 0 30px rgba(0,0,0,0.8);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .record {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    position: relative;
    cursor: grab;
    background:
      radial-gradient(circle, #111 0%, #151515 100%),
      repeating-radial-gradient(circle, #000 0px, #111 2px, #000 4px);
  }

  .record::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background:
      radial-gradient(circle,
        transparent 0%,
        transparent 35%,
        #2a2a2a 36%,
        transparent 37%,

        transparent 50%,
        #2a2a2a 51%,
        transparent 52%,

        transparent 65%,
        #2a2a2a 66%,
        transparent 67%,

        transparent 80%,
        #2a2a2a 81%,
        transparent 82%
      );
    pointer-events: none;
  }

  .record:active {
    cursor: grabbing;
    box-shadow: 0 0 15px rgba(255,255,255,0.2);
  }

  .label {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle at 30% 30%, #ff6, #c33);
    z-index: 1;
  }

  .spindle {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    background: #ddd;
    z-index: 2;
  }

  .tonearm {
    position: absolute;
    width: 90px;
    height: 8px;
    background: #999;
    border-radius: 5px;
    top: 24px;
    right: -24px;
    transform-origin: left center;
    transform: rotate(25deg);
  }

  .tonearm-head {
    position: absolute;
    width: 16px;
    height: 12px;
    background: #ccc;
    right: 0;
    top: -2px;
    border-radius: 3px;
  }

  .spin {
    animation: spin 3s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<div class="library" id="library">
  <!-- Song list populated by JS -->
</div>

<div class="player-area">
  <img id="currentCover" class="current-cover" alt="">
  <div id="currentArtist" class="current-artist">Artist</div>
  <div id="currentTitle" class="current-title">Title</div>

  <div class="time-row">
    <span id="currentTime">0:00</span>
    <input id="timeSlider" class="time-slider" type="range" min="0" max="100" value="0">
    <span id="totalTime">0:00</span>
  </div>

  <div class="controls-row">
    <button id="prevBtn">Prev</button>
    <button id="playBtn">Play</button>
    <button id="pauseBtn">Pause</button>
    <button id="nextBtn">Next</button>
  </div>

  <div class="turntable">
    <div class="record spin" id="record">
      <div class="label"></div>
      <div class="spindle"></div>
    </div>
    <div class="tonearm">
      <div class="tonearm-head"></div>
    </div>
  </div>

  <audio id="audio"></audio>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsmediatags@3.9.5/dist/jsmediatags.min.js"></script>
<script>
const GITHUB_USER = "NathanM32712";
const GITHUB_REPO = "spootify";
const GITHUB_BRANCH = "main";
const SONGS_API = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/songs?ref=${GITHUB_BRANCH}`;
const RAW_BASE = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${GITHUB_BRANCH}/songs/`;

const libraryEl = document.getElementById('library');
const audio = document.getElementById('audio');
const currentCover = document.getElementById('currentCover');
const currentArtist = document.getElementById('currentArtist');
const currentTitle = document.getElementById('currentTitle');
const currentTimeEl = document.getElementById('currentTime');
const totalTimeEl = document.getElementById('totalTime');
const timeSlider = document.getElementById('timeSlider');
const playBtn = document.getElementById('playBtn');
const pauseBtn = document.getElementById('pauseBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const record = document.getElementById('record');

let songs = [];
let currentIndex = -1;
let isDraggingRecord = false;
let baseAngle = 0;
let dragStartAngle = 0;
let recordAngle = 0;

function formatTime(sec) {
  if (!isFinite(sec)) return "0:00";
  sec = Math.floor(sec);
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${s.toString().padStart(2, "0")}`;
}

function createSongElement(song, index) {
  const item = document.createElement('div');
  item.className = 'song-item';
  item.dataset.index = index;

  const img = document.createElement('img');
  img.className = 'song-cover';
  img.src = song.cover || "";
  item.appendChild(img);

  const meta = document.createElement('div');
  meta.className = 'song-meta';

  const title = document.createElement('div');
  title.className = 'song-title';
  title.textContent = song.title || song.name;
  meta.appendChild(title);

  const artist = document.createElement('div');
  artist.className = 'song-artist';
  artist.textContent = song.artist || "Unknown artist";
  meta.appendChild(artist);

  const extra = document.createElement('div');
  extra.className = 'song-extra';

  const length = document.createElement('span');
  length.className = 'length';
  length.textContent = song.duration ? formatTime(song.duration) : "--:--";
  extra.appendChild(length);

  if (song.genre) {
    const tag = document.createElement('span');
    tag.className = 'tag';
    tag.textContent = song.genre;
    extra.appendChild(tag);
  }
  if (song.year) {
    const tag = document.createElement('span');
    tag.className = 'tag';
    tag.textContent = song.year;
    extra.appendChild(tag);
  }

  meta.appendChild(extra);
  item.appendChild(meta);

  item.addEventListener('click', () => {
    loadSong(index);
    audio.play();
    record.classList.add('spin');
  });

  return item;
}

async function fetchSongs() {
  const res = await fetch(SONGS_API);
  const data = await res.json();
  const mp3s = data.filter(f => f.name.toLowerCase().endsWith('.mp3'));

  songs = mp3s.map(f => ({
    name: f.name.replace(/\.mp3$/i, ''),
    file: f.name,
    url: RAW_BASE + encodeURIComponent(f.name),
    title: null,
    artist: null,
    album: null,
    cover: null,
    duration: null,
    genre: null,
    year: null
  }));

  songs.forEach((song, i) => {
    const el = createSongElement(song, i);
    libraryEl.appendChild(el);
    loadMetadata(song, i, el);
    loadDuration(song, i, el);
  });
}

function loadMetadata(song, index, el) {
  jsmediatags.read(song.url, {
    onSuccess: tag => {
      const t = tag.tags;
      song.title = t.title || song.name;
      song.artist = t.artist || "Unknown artist";
      song.album = t.album || "";
      song.genre = t.genre || null;
      song.year = t.year || null;

      const titleEl = el.querySelector('.song-title');
      const artistEl = el.querySelector('.song-artist');
      titleEl.textContent = song.title;
      artistEl.textContent = song.artist;

      const extraEl = el.querySelector('.song-extra');
      if (song.genre) {
        const tagEl = document.createElement('span');
        tagEl.className = 'tag';
        tagEl.textContent = song.genre;
        extraEl.appendChild(tagEl);
      }
      if (song.year) {
        const tagEl = document.createElement('span');
        tagEl.className = 'tag';
        tagEl.textContent = song.year;
        extraEl.appendChild(tagEl);
      }

      const pic = t.picture;
      if (pic) {
        const base64 = btoa(
          new Uint8Array(pic.data).reduce((data, byte) => data + String.fromCharCode(byte), "")
        );
        const url = `data:${pic.format};base64,${base64}`;
        song.cover = url;
        const imgEl = el.querySelector('.song-cover');
        imgEl.src = url;
        if (index === currentIndex) {
          currentCover.src = url;
        }
      }
    }
  });
}

function loadDuration(song, index, el) {
  const a = new Audio();
  a.src = song.url;
  a.addEventListener('loadedmetadata', () => {
    song.duration = a.duration;
    const lengthEl = el.querySelector('.length');
    lengthEl.textContent = formatTime(song.duration);
    if (index === currentIndex) {
      totalTimeEl.textContent = formatTime(song.duration);
      timeSlider.max = Math.floor(song.duration);
    }
  });
}

function loadSong(index) {
  if (index < 0 || index >= songs.length) return;
  currentIndex = index;
  const song = songs[index];
  audio.src = song.url;

  currentTitle.textContent = song.title || song.name;
  currentArtist.textContent = song.artist || "Unknown artist";
  currentCover.src = song.cover || "";

  if (song.duration) {
    totalTimeEl.textContent = formatTime(song.duration);
    timeSlider.max = Math.floor(song.duration);
  } else {
    totalTimeEl.textContent = "0:00";
    timeSlider.max = 0;
  }

  record.classList.add('spin');
}

playBtn.addEventListener('click', () => {
  if (currentIndex === -1 && songs.length > 0) {
    loadSong(0);
  }
  audio.play();
  record.classList.add('spin');
});

pauseBtn.addEventListener('click', () => {
  audio.pause();
  record.classList.remove('spin');
});

prevBtn.addEventListener('click', () => {
  if (songs.length === 0) return;
  const next = currentIndex <= 0 ? songs.length - 1 : currentIndex - 1;
  loadSong(next);
  audio.play();
});

nextBtn.addEventListener('click', () => {
  if (songs.length === 0) return;
  const next = currentIndex >= songs.length - 1 ? 0 : currentIndex + 1;
  loadSong(next);
  audio.play();
});

audio.addEventListener('timeupdate', () => {
  if (isDraggingRecord) return;
  currentTimeEl.textContent = formatTime(audio.currentTime);
  if (audio.duration) {
    timeSlider.max = Math.floor(audio.duration);
    timeSlider.value = Math.floor(audio.currentTime);
  }
});

timeSlider.addEventListener('input', () => {
  audio.currentTime = Number(timeSlider.value);
});

timeSlider.addEventListener('change', () => {
  audio.currentTime = Number(timeSlider.value);
});

/* Record drag-to-scrub */
function getCenter(el) {
  const rect = el.getBoundingClientRect();
  return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
}

function getAngleFromEvent(e, center) {
  const x = e.clientX - center.x;
  const y = e.clientY - center.y;
  return Math.atan2(y, x) * 180 / Math.PI;
}

function updateRecordRotation(angle) {
  recordAngle = angle;
  record.style.transform = `rotate(${angle}deg)`;
}

function angleToTime(angle) {
  if (!audio.duration) return 0;
  let norm = ((angle % 360) + 360) % 360;
  return (norm / 360) * audio.duration;
}

record.addEventListener('mousedown', (e) => {
  isDraggingRecord = true;
  record.classList.remove('spin');
  const center = getCenter(record);
  dragStartAngle = getAngleFromEvent(e, center);
  baseAngle = recordAngle;
});

window.addEventListener('mousemove', (e) => {
  if (!isDraggingRecord) return;
  const center = getCenter(record);
  const angle = getAngleFromEvent(e, center);
  const delta = angle - dragStartAngle;
  updateRecordRotation(baseAngle + delta);
});

window.addEventListener('mouseup', () => {
  if (!isDraggingRecord) return;
  isDraggingRecord = false;
  const t = angleToTime(recordAngle);
  if (audio.duration) {
    audio.currentTime = t;
    timeSlider.value = Math.floor(t);
    currentTimeEl.textContent = formatTime(t);
  }
  if (!audio.paused) record.classList.add('spin');
});

fetchSongs();
</script>
</body>
</html>
